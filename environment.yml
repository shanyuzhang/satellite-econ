# 本地 conda 环境：只用于 GEE 提交、标签处理、代码调试
# Colab 上不用这个文件，直接 pip install -r requirements.txt
#
# 创建：conda env create -f environment.yml
# 激活：conda activate satellite
# 更新：conda env update -f environment.yml --prune

name: satellite
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pandas>=2.0
  - numpy>=1.24
  - pyyaml
  - tqdm
  - rasterio>=1.3       # 本地若想读一两张 tif 验证
  - matplotlib          # 看一下 GEE 导出的图
  - pip:
      - earthengine-api>=0.1.380
      - geemap>=0.30.0
